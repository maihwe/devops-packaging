# ============================================================
# application-staging.properties — Staging Environment
# Active when: spring.profiles.active=staging
# ============================================================

# PostgreSQL (mirrors production)
spring.datasource.url=jdbc:postgresql://staging-db.internal:5432/devops_spring_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging
logging.level.root=WARN
logging.level.com.devops=INFO
